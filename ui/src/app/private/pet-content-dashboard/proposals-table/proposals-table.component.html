@if (disconnected()) {
  <div class="disconnected-indicator">
    Real-time updates temporarily unavailable. Reconnecting…
  </div>
}

<table mat-table [dataSource]="dataSource" [trackBy]="trackByWeightedAssociationId" class="mat-elevation-z2"
       [fixedLayout]="true">

  <ng-container matColumnDef="weightedAssociationId">
    <th mat-header-cell *matHeaderCellDef>Id</th>
    <td mat-cell *matCellDef="let row">{{ row.weightedAssociationId }}</td>
  </ng-container>

  <ng-container matColumnDef="sightingId">
    <th mat-header-cell *matHeaderCellDef>Sighting</th>
    <td mat-cell *matCellDef="let row">{{ row.sightingId }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let row">{{ row.status }}</td>
  </ng-container>

  <ng-container matColumnDef="distance">
    <th mat-header-cell *matHeaderCellDef>Distance</th>
    <td mat-cell *matCellDef="let row">{{ row.distance }}</td>
  </ng-container>

  <ng-container matColumnDef="score">
    <th mat-header-cell *matHeaderCellDef>Score</th>
    <td mat-cell *matCellDef="let row">{{ row.score }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"
      [class.row-highlight]="isHighlighted(row)"></tr>
</table>
