<div class="main-grid">

  <section class="table-pane">

    <!-- HEADER -->
    <div class="table-header mat-elevation-z2">
      <div class="header-cell">Id</div>
      <div class="header-cell">Owner</div>
      <div class="header-cell">Updated At</div>
      <div class="header-cell">Type</div>
      <div class="header-cell">Remove After Matching</div>
    </div>

    <!-- VIRTUAL BODY -->
    <cdk-virtual-scroll-viewport
      class="viewport"
      [itemSize]="rowHeight"
      [minBufferPx]="200"
      [maxBufferPx]="400" (scrolledIndexChange)="onScrollIndexChange($event)">

      <div
        class="table-row"
        *cdkVirtualFor="let row of sightings(); trackBy: trackBySightingId"
        (click)="clickedRow() == row ? clickedRow.set(null) : clickedRow.set(row)"
        [class.row-is-clicked]="clickedRow() == row">

        <div class="cell">{{ row.sightingId }}</div>
        <div class="cell">{{ row.ownerId }}</div>
        <div class="cell">{{ row.timestamp | date:'medium' }}</div>
        <div class="cell">{{ row.type }}</div>
        <div class="cell">{{ row.removeAfterMatching }}</div>

      </div>

    </cdk-virtual-scroll-viewport>

  </section>

  <section class="details-pane">
    <div>
      @if (clickedRow() != null) {
        <track-rejoice-selected-item [selectedItem]="clickedRow()" />
      } @else {
        Items fetched: {{ sightings()?.length }}
      }
    </div>
  </section>

</div>
