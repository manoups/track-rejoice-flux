<div class="main-grid">
  <section class="table-pane">
    <table mat-table [dataSource]="dataSource" [trackBy]="trackByWeightedAssociationId" class="mat-elevation-z2"
           [fixedLayout]="true">

      <ng-container matColumnDef="weightedAssociationId">
        <th mat-header-cell *matHeaderCellDef sticky>Id</th>
      </ng-container>

      <ng-container matColumnDef="distance">
        <th mat-header-cell *matHeaderCellDef sticky>Distance</th>
      </ng-container>

      <ng-container matColumnDef="score">
        <th mat-header-cell *matHeaderCellDef sticky>Score</th>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef sticky>Status</th>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    </table>


    <cdk-virtual-scroll-viewport
      class="viewport"
      [itemSize]="rowHeight"
      (scrolledIndexChange)="onScrollIndexChange($event)">

      <table mat-table [dataSource]="dataSource" [trackBy]="trackByWeightedAssociationId" class="mat-elevation-z2"
             [fixedLayout]="true">

        <ng-container matColumnDef="weightedAssociationId">
          <td mat-cell *matCellDef="let row">{{ row.weightedAssociationId }}</td>
        </ng-container>

        <ng-container matColumnDef="distance">
          <td mat-cell *matCellDef="let row">{{ row.distance }}</td>
        </ng-container>

        <ng-container matColumnDef="score">
          <td mat-cell *matCellDef="let row">
            {{ row.score }}
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <td mat-cell *matCellDef="let row">
            {{ row.status }}
          </td>
        </ng-container>

        <tr mat-row *matRowDef="let row; columns: displayedColumns;"
            (click)="clickedRow() == row ? clickedRow.set(null) : clickedRow.set(row)"
            [class.row-is-clicked]="clickedRow() == row"></tr>
      </table>
    </cdk-virtual-scroll-viewport>
  </section>
  <section class="details-pane">
    <div>
      @if (clickedRow() != null) {
        <track-rejoice-selected-item [selectedItem]="clickedRow()"/>
      } @else {
        Items fetched: {{ weightedAssociationStates()?.length }}
      }
    </div>
  </section>
</div>
